version: '3.8'

services:
  # 1. Base de Datos (PostgreSQL)
  kiora-db:
    image: postgres:15-alpine
    container_name: kiora_database
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: kiora
    ports:
      - "5433:5432"
    volumes:
      - kiora_db_data:/var/lib/postgresql/data

  # 2. Interfaz Visual para la BD (pgAdmin)
  kiora-pgadmin:
    image: dpage/pgadmin4
    container_name: kiora_admin_db
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kiora.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - kiora-db

volumes:
  kiora_db_data:
  kiora_pgadmin_data: