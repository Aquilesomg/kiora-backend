version: '3.9'

services:
  # 1. Base de Datos (PostgreSQL)
  kiora-db:
    image: postgres:16-alpine
    container_name: kiora_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123}
      POSTGRES_DB: ${DB_NAME:-kiora}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - kiora_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-kiora}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Interfaz Visual para la BD (pgAdmin)
  kiora-pgadmin:
    image: dpage/pgadmin4
    container_name: kiora_admin_db
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kiora.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - kiora-db

  # 3. Users Service
  users-service:
    build:
      context: ./services/users-service
      dockerfile: Dockerfile
    container_name: kiora_users_service
    restart: unless-stopped
    ports:
      - "3002:3001"
    env_file:
      - ./services/users-service/.env
    environment:
      DB_HOST: kiora-db    # Nombre del servicio Docker, no localhost
      DB_PORT: 5432        # Puerto interno del contenedor
    depends_on:
      kiora-db:
        condition: service_healthy

volumes:
  kiora_db_data:
  kiora_pgadmin_data: